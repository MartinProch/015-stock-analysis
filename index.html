<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stock Analysis</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">WF</span>
        <div>
          <h1>Stock Analysis</h1>
          <p>Elliott wave workspace</p>
        </div>
      </div>
      <form id="tickerForm" class="ticker-form">
        <input id="tickerInput" autocomplete="off" placeholder="SPY, AAPL, MSFT..." />
        <button type="submit">Load</button>
      </form>
      <div id="statusLine" class="status-line">Ready</div>
    </header>

    <aside class="watchlist-panel">
      <div class="panel-head">
        <h2>Watchlist</h2>
        <select id="sortSelect">
          <option value="default">Default</option>
          <option value="score">Wave score</option>
          <option value="change">Change %</option>
          <option value="rsi">RSI</option>
        </select>
      </div>
      <div id="watchlist" class="watchlist"></div>
    </aside>

    <main class="chart-area">
      <section class="dashboard-card chart-card">
        <div class="chart-card-head">
          <div>
            <p class="eyebrow">Market terminal</p>
            <h2>Wave analysis</h2>
          </div>
          <div class="chart-actions">
            <div class="segment" id="timeframes">
              <button data-range="5d" data-tip="1 Week|Shows roughly five trading days.|Useful for very short-term reaction checks.">1W</button>
              <button data-range="1mo" data-tip="1 Month|Shows the last month of daily bars.|Good for recent momentum and quick swing setups.">1M</button>
              <button data-range="3mo" data-tip="3 Months|Shows roughly one quarter.|Best for current Elliott wave structure and near-term pivots.">3M</button>
              <button data-range="6mo" data-tip="6 Months|Shows a medium-term trend window.|Useful for comparing current setup with the prior cycle.">6M</button>
              <button data-range="ytd" data-tip="Year to Date|Starts at the first trading day of the current year.|Use it to compare this year’s trend and relative performance.">YTD</button>
              <button data-range="1y" data-tip="1 Year|Shows about 252 trading days.|Useful for larger support/resistance and trend regime checks.">1Y</button>
              <button data-range="2y" class="active" data-tip="2 Years|Shows the broader swing structure.|Good for dominant wave count and longer moving averages.">2Y</button>
              <button data-range="5y" data-tip="5 Years|Shows the big-picture trend.|Best for multi-year context and major levels.">5Y</button>
            </div>
            <button id="resetZoomBtn" class="ghost" data-tip="Reset Zoom|Restores the chart to the full selected timeframe.|You can also double-click the chart.">Reset zoom</button>
          </div>
        </div>
        <div class="chart-toolbar">
          <div class="segment overlays" id="overlays">
            <button data-toggle="waves" class="active" data-tip="Elliott Waves|Labels detected pivots and current wave state.|Use it as a starting map, then review the count manually.">Waves</button>
            <button data-toggle="fibs" class="active" data-tip="Fibonacci Levels|Draws retracement and extension levels from the wave count or visible range.|Useful for target and pullback confluence.">Fibs</button>
            <button data-toggle="sr" class="active" data-tip="Support / Resistance|Marks clustered local highs and lows.|Touch count shows how often price reacted near the level.">S/R</button>
            <button data-toggle="zones" class="active" data-tip="Zones|Highlights a simple wave-derived buy/interest zone.|Best used together with support, RSI, and wave invalidation.">Zones</button>
            <button data-toggle="volume" class="active" data-tip="Volume Bars|Shows traded volume below the price chart.|Use spikes to confirm or question price moves.">Volume</button>
            <button data-toggle="divergence" class="active" data-tip="RSI Divergence|Detects bullish or bearish disagreement between price and RSI.|Often useful near pivots and exhaustion moves.">RSI div</button>
            <button data-toggle="wma50" data-tip="WMA50|Draws a 50-period weighted moving average.|Useful for the intermediate trend and pullback support in stronger moves.">WMA50</button>
            <button data-toggle="wma200" class="active" data-tip="WMA200|Draws a 200-period weighted moving average.|A broad trend filter inspired by Wavefront.">WMA200</button>
            <button data-toggle="profile" data-tip="Volume Profile|Shows volume distribution by price on the left side.|The strongest bucket marks a simple point of control.">VP</button>
            <button data-toggle="channel" data-tip="Regression Channel|Draws a least-squares trend channel with volatility bands.|Useful for judging trend slope and stretched moves.">Channel</button>
            <button data-toggle="measured" data-tip="Measured Move|Projects AB=CD style targets from recent pivots.|Use as a simple move-completion reference.">MM</button>
            <button data-toggle="fibtime" data-tip="Fibonacci Time Zones|Projects vertical timing markers from the latest pivot.|Looks for time confluence with price levels.">Fib time</button>
            <button data-toggle="candles" data-tip="Candlestick Labels|Marks recent doji, hammer, hanging, and engulfing patterns.|A compact pattern helper, not a full candle engine.">Candles</button>
          </div>
        </div>
        <div class="canvas-wrap">
          <canvas id="priceCanvas"></canvas>
          <div id="emptyState" class="empty-state">Load a ticker to start.</div>
        </div>
      </section>
    </main>

    <aside class="analysis-panel">
      <nav class="tabs">
        <button data-tab="waves" class="active">Waves</button>
        <button data-tab="scanner">Scanner</button>
        <button data-tab="risk">Risk</button>
        <button data-tab="rs">RS Rank</button>
        <button data-tab="compare">Compare</button>
        <button data-tab="portfolio">Portfolio</button>
        <button data-tab="help">Help</button>
      </nav>
      <section id="panelContent" class="panel-content"></section>
    </aside>
  </div>
  <script src="app.js"></script>
</body>
</html>
